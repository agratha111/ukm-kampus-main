<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin UKM</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { display: flex; min-height: 100vh; background-color: #f1f5f9; color: #334155; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: #0f172a; color: white; padding: 25px 20px; display: flex; flex-direction: column; box-shadow: 4px 0 10px rgba(0,0,0,0.05); }
        .sidebar h2 { font-size: 20px; font-weight: 700; margin-bottom: 30px; text-align: center; color: #f8fafc; border-bottom: 1px solid #334155; padding-bottom: 15px;}
        .sidebar a { color: #94a3b8; text-decoration: none; padding: 12px 15px; margin: 5px 0; border-radius: 8px; font-weight: 500; transition: 0.3s; }
        .sidebar a:hover { background: #1e293b; color: white; }
        .sidebar a.active { background: #3b82f6; color: white; }
        .btn-logout { background: rgba(239, 68, 68, 0.1); color: #ef4444 !important; margin-top: auto !important; text-align: center; border: 1px solid #ef4444;}
        .btn-logout:hover { background: #ef4444 !important; color: white !important; }
        
        /* Content */
        .content { flex: 1; padding: 40px; }
        .header-title { font-size: 28px; font-weight: 700; color: #0f172a; margin-bottom: 30px; }
        
        /* Form Card */
        .form-card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); margin-bottom: 40px; border: 1px solid #e2e8f0; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 0.85rem; font-weight: 600; color: #64748b; margin-bottom: 8px; }
        .form-input { width: 100%; padding: 12px 16px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 14px; transition: 0.3s; }
        .form-input:focus { border-color: #3b82f6; outline: none; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        .btn-simpan { background: #10b981; color: white; width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.3s; font-size: 15px; }
        .btn-simpan:hover { background: #059669; transform: translateY(-2px); }

        /* Table Card */
        .table-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; color: #475569; font-weight: 600; font-size: 14px; text-transform: uppercase; }
        .btn-hapus { background: #ef4444; color: white; padding: 8px 15px; text-decoration: none; border-radius: 6px; font-size: 13px; font-weight: 600; }
        .btn-hapus:hover { background: #dc2626; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Panel Admin</h2>
        <a href="/admin/dashboard" class="active">📊 Kelola Data</a>
        <a href="/admin/logout" class="btn-logout">🚪 Logout</a>
    </div>
    
    <div class="content">
        <h1 class="header-title">Manajemen Database UKM</h1>
        
        <div class="form-card">
            <h3 style="margin-bottom: 20px; color: #0f172a;">Tambah Unit Kegiatan Mahasiswa</h3>
            <form action="/admin/tambah-ukm" method="POST">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label class="form-label">Nama UKM</label>
                        <input type="text" name="nama" class="form-input" placeholder="Contoh: Robotik" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Nomor WA Ketua</label>
                        <input type="text" name="kontakWa" class="form-input" placeholder="62812345678" required>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Visi</label>
                    <textarea name="visi" class="form-input" rows="2" placeholder="Tuliskan visi UKM..."></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Misi</label>
                    <textarea name="misi" class="form-input" rows="3" placeholder="Tuliskan misi UKM..."></textarea>
                </div>
                <button type="submit" class="btn-simpan">+ Simpan Data UKM</button>
            </form>
        </div>

        <div class="table-card">
            <h3>Daftar UKM Aktif</h3>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nama UKM</th>
                        <th>Kontak WhatsApp</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="ukm : ${listUkm}">
                        <td th:text="${ukm.id}"></td>
                        <td th:text="${ukm.nama}" style="font-weight: 500;"></td>
                        <td th:text="${ukm.kontakWa}"></td>
                        <td>
                            <a th:href="@{/admin/hapus-ukm/{id}(id=${ukm.id})}" class="btn-hapus" onclick="return confirm('Yakin ingin menghapus?')">Hapus</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(listUkm)}">
                        <td colspan="4" style="text-align:center; padding:30px; color:#94a3b8;">Belum ada data UKM.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
