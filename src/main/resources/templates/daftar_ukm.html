<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar UKM | Universitas IPWIJA</title>
    <style>
        /* Reset & Base */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f6f9; color: #333; line-height: 1.6; }

        /* === MENU NAVIGASI & BURGER === */
        .header-nav { background-color: #0e004d; color: white; padding: 1rem 2rem; position: relative; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .nav { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
        .logo { font-size: 1.5rem; font-weight: bold; }
        
        .nav-links { display: flex; align-items: center; }
        .nav-links a { color: #e0f2f1; text-decoration: none; margin-left: 1.5rem; font-weight: 500; }
        .nav-links a:hover, .nav-links a.active { color: #ffffff; border-bottom: 2px solid #ffffff; }

        /* Burger Style */
        .burger { display: none; cursor: pointer; padding: 5px; }
        .burger span { display: block; width: 25px; height: 3px; background: white; margin: 5px; }

        /* Responsive Mobile */
        @media (max-width: 768px) {
            .burger { display: block; }
            .nav-links { 
                display: none; 
                flex-direction: column; 
                position: absolute; 
                top: 60px; 
                left: 0; 
                width: 100%; 
                background-color: #0e004d; 
                padding: 1rem 0;
                text-align: center;
            }
            .nav-links.active { display: flex; }
            .nav-links a { margin: 10px 0; }
        }

        /* === HERO === */
        .hero { position: relative; width: 100%; height: 250px; background-image: url('/gedung.jpg'); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; }
        .hero-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(5, 0, 77, 0.7); }
        .hero-content { position: relative; z-index: 2; text-align: center; color: white; }
        .hero-title { font-size: 2.2rem; font-weight: 700; margin-bottom: 0.5rem; }

        /* === KONTEN UTAMA === */
        .main-container { max-width: 1100px; margin: 0 auto; padding: 0 2rem 3rem 2rem; }
        .content-box { background: #ffffff; margin-top: -3rem; position: relative; z-index: 3; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 2.5rem; }
        .section-title { font-size: 1.5rem; color: #0c004d; margin-bottom: 1.5rem; text-align: center; }
        .section-title::after { content: ''; display: block; width: 60px; height: 3px; background-color: #02006b; margin: 8px auto 0 auto; }

        /* === GRID & KARTU UKM === */
        .ukm-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
        .ukm-card { background: white; padding: 1.5rem; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-top: 4px solid #0c004d; transition: 0.3s; display: flex; flex-direction: column; }
        .ukm-card:hover { transform: translateY(-5px); border-top-color: #ffc107; }
        .ukm-card h3 { color: #0c004d; font-size: 1.25rem; margin-bottom: 0.5rem; }
        .ukm-category { display: inline-block; background-color: #e0f2f1; color: #000c4d; font-size: 0.8rem; padding: 0.25rem 0.75rem; border-radius: 12px; margin-bottom: 1rem; font-weight: 600; }
        .ukm-desc { font-size: 0.95rem; color: #555; line-height: 1.5; flex-grow: 1; margin-bottom: 1.5rem; }
        .btn-join { display: block; padding: 0.6rem; background: #00014d; color: white; text-align: center; border-radius: 6px; text-decoration: none; font-weight: bold; }
        .btn-join:hover { background: #ffc107; color: #01004d; }
    </style>
</head>
<body>

    <header class="header-nav">
        <nav class="nav">
            <div class="logo">Universitas IPWIJA</div>
            <!-- Tombol Burger -->
            <div class="burger" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </div>
            <!-- List Link -->
            <div class="nav-links" id="navLinks">
                <a href="/">Beranda</a>
                <a href="/daftar_ukm" class="active">Daftar UKM</a>
                <a href="/pendaftaran">Pendaftaran</a>
            </div>
        </nav>
    </header>

    <header class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1 class="hero-title">Daftar Unit Kegiatan Mahasiswa</h1>
            <p>Temukan dan kembangkan minat serta bakatmu di sini</p>
        </div>
    </header>

    <main class="main-container">
        <div class="content-box">
            <h2 class="section-title">UKM Tersedia</h2>
            
            <div class="ukm-grid" th:if="${not #lists.isEmpty(listUkm)}">
                <div class="ukm-card" th:each="ukm : ${listUkm}">
                    <h3 th:text="${ukm.nama}">Nama UKM</h3>
                    <span class="ukm-category">Unit Kegiatan Mahasiswa</span>
                    <p class="ukm-desc" th:text="'Hubungi via WA: ' + ${ukm.kontakWa}">Kontak</p>
                    <a th:href="@{/detail-ukm/{id}(id=${ukm.id})}" class="btn-join" style="background-color: #ffc107; color: #000;">Lihat Detail</a>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(listUkm)}" style="text-align: center; padding: 20px;">
                <p>Belum ada data UKM di database.</p>
            </div>
        </div>
    </main>

    <!-- Script untuk Toggle Menu -->
    <script>
        function toggleMenu() {
            document.getElementById("navLinks").classList.toggle("active");
        }
    </script>
</body>
</html>
