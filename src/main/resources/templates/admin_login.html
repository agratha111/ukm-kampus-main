<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Administrator</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-box { background: white; padding: 40px; border-radius: 16px; width: 100%; max-width: 380px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); }
        .logo-area { text-align: center; margin-bottom: 30px; }
        .logo-area h2 { color: #0f172a; font-size: 24px; font-weight: 700; }
        .logo-area p { color: #64748b; font-size: 14px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; color: #475569; font-weight: 600; margin-bottom: 8px; }
        input { width: 100%; padding: 12px 15px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; background: #f8fafc; outline: none; transition: 0.3s; }
        input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); background: white; }
        
        .btn-login { background: #3b82f6; color: white; padding: 12px; border: none; border-radius: 8px; width: 100%; cursor: pointer; font-weight: 600; font-size: 15px; transition: 0.3s; margin-top: 10px; }
        .btn-login:hover { background: #2563eb; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3); }
        
        .error { background: #fee2e2; color: #b91c1c; padding: 10px; border-radius: 8px; text-align: center; font-size: 13px; margin-bottom: 20px; font-weight: 500; }
        .back-link { display: block; text-align: center; margin-top: 25px; color: #64748b; text-decoration: none; font-size: 13px; font-weight: 500; transition: 0.2s; }
        .back-link:hover { color: #0f172a; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo-area">
            <h2>Portal Admin</h2>
            <p>Sistem Informasi UKM</p>
        </div>
        
        <div class="error" th:if="${error}" th:text="${error}"></div>
        
        <form action="/admin/login" method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Masukkan username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login">Masuk Sistem</button>
        </form>
        <a href="/" class="back-link">&larr; Kembali ke Beranda Mahasiswa</a>
    </div>
</body>
</html>
